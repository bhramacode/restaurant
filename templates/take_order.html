{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>order</title>
  <link rel="stylesheet" href="{% static 'bulma/css/bulma.min.css' %}">
  <link rel="stylesheet" href="{% static 'fontawesome-free-7.0.0-web/css/all.min.css' %}">
  <style>

/* mobile screen */
@media screen and (max-width:480px)
{
    .card{
        background-color: rgb(201, 109, 109);
        width:100%;
        height:100%;
    }
     .card .card-content{
        margin: 0;
        padding: 0;
    }

     .box{
        position:absolute;
        top:150px;
        left: 0;
    }
    .back-button{
        position: absolute;
        top:700px;
    }

    .has-addons{
        position:absolute;
        top:60px;
    }
}


/* desktop screen and large screen*/
@media screen and (min-width:769px)
{
    .card{
        background-color: rgb(201, 109, 109);
        width:80%;
        height:100%;
    }
     .card .card-content{
        margin: 0;
        padding: 0;
    }
    .box{
        position:absolute;
        top:200px;
        left:100px;
    }
   
}

@media screen and (min-width: 481px) and (max-width: 768px) 
{
    .card {
        background-color: rgb(201, 109, 109);
        width:80%;
        height:100%;
    }
    
    .card .card-content {
        margin: 0;
        padding:0;
    }
    
    
    .box {
        position: relative;
        top: 0;
        left: 0;
        margin: 15px;
        width: auto;
        max-height: 550px;
        overflow: auto;
        padding: 20px;
    }
    
    .fixed-grid .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        padding: 10px;
    }
    
    .cell {
        margin-bottom: 15px;
    }
}


</style>
</head>
<body>
    <header class="has-background-info-25">
        <span class="icon-text ml-2 mt-2 has-text-white">
            📝
            <span class="is-capitalized has-text-weight-bold ">new order</span>
        </span>
    </header>
    

    <section class="section">
        <div class="field has-addons">
            <div class="control">
                <input type="text" class="input" placeholder="search food">
            </div>

            <div class="control">
                <button class="button">
                    search
                </button>
            </div>
        </div>
    </section>



    <section class="section">
        <div class="container box">
            <div class="fixed-grid has-2-cols-mobile has-5-cols-desktop has-4-cols-tablet">
                <div class="grid is-gap-1">
                    {% for item in data %}
                    <div class="cell">
                        <div class="card has-background-info-25">
                            <center>
                                <div class="card-image">
                                    <figure class="image is-96x96">
                                        <img src="{{item.image.url}}" alt="image" class="has-text-white is-rounded" >
                                    </figure>
                                </div>

                                <div class="card-content has-text-white is-capitalized">
                                    <span class="item">{{item.item}}</span><br>
                                    <span>Rs</span><span class="rupees">{{item.selling_price}}</span>
                                </div>
                                <div class="card-footer">
                                    <a href="{% url 'cart' %}" class="button footer-item is-fullwidth">make order</a>
                                </div>
                            </center>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="back-button">
                <a href="{% url 'dashboard' %}" class="has-text-black is-capitalized">
                    <span class="icon">
                        <i class="fas fa-arrow-left"></i>
                    </span>
                    back
                </a>
            </div>
        </div>
    </section>
</body>
</html>
