{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>attendance records</title>
    <link rel="stylesheet" href="{% static 'bulma/css/bulma.min.css' %}">
    <link rel="stylesheet" href="{% static 'fontawesome-free-7.0.0-web/css/all.min.css' %}">
    <style>
        @media screen and (max-width:480px)
        {
         .table-box{
            position: absolute;
            top:100px;
            left:10px;
            overflow: auto;
            height: 250px;
            width:95%;
            border-radius: 10px;
            border-style: solid;
         }   
        }

        @media screen and (min-width:481px)
        {
         .table-box{
            overflow: auto;
            height:400px; 
            border-radius: 10px;
            border-style: solid;
            margin: 0;
            padding: 0;
            width:85%;
            margin:100px;
         }   
        }


        
    </style>
</head>
<body>
    <header class="has-background-info-25">
        <span>📝</span>
        <span class="has-text-white is-capitalized">staff attendance rocords</span>
    </div>
    </header>
    <a href="{% url 'dashboard' %}" class="has-text-info-25 is-capitalized" style="position: absolute;top:50px;left: 20px;">
        <span class="icon">
            <i class="fas fa-arrow-left"></i>
        </span>
        <span>back</span>
    </a>

    
    <div class="table-box">
        <table class="table is-narrow is-fullwidth">
            <thead class="has-background-info-25 is-capitalized" style="position: sticky;top:0px;">
                <tr>
                    <th class="has-text-white">id</th>

                    <th class="has-text-white">name</th>
                    <th class="has-text-white">email</th>
                    <th class="has-text-white">role</th>
                    <th class="has-text-white">status</th>
                    <th class="has-text-white">date</th>
                    <th class="has-text-white">actions</th>
                </tr>
            </thead>


            <tbody>
                {% for attendance in attendances %}
                <tr class="has-text-white">
                    <td>{{attendance.id}}</td>

                    <td>{{attendance.username}}</td>
                    <td>{{attendance.email}}</td>
                    <td>{{attendance.role}}</td>
                    <td>{{attendance.status}}</td>
                    <td>{{attendance.date}}</td>
                    <td>
                        <div class="buttons">
                            <a href="">
                                <span class="icon has-text-link">
                                    <i class="fas fa-edit"></i>
                                </span>
                            </a>
                            <a href="{% url 'deleteattendance' attendance.id %}">
                                <span class="icon has-text-danger">
                                    <i class="fas fa-trash-can"></i>
                                </span>
                            </a>
                        </div>
                    </td>
                </tr>
                {% endfor %}

            </tbody>
        </table>
    </div>
</body>
</html>
